name: my_flutter_app
description: FYT - AI Fashion Stylist
publish_to: "none"
version: 0.0.1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Firebase (Auth and Firestore only)
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  # AI (Mistral - keep for online mode)
  http: ^1.2.1
  # Camera & Media
  camera: ^0.11.2
  image_picker: ^1.2.0
  google_mlkit_pose_detection: ^0.13.0
  google_mlkit_commons: ^0.9.0
  # UI
  google_fonts: ^6.3.0
  flutter_svg: ^2.2.0
  lottie: ^3.3.1
  shimmer: ^3.0.0
  # Local Storage
  sqflite: ^2.4.1
  path_provider: ^2.1.0
  shared_preferences: ^2.5.3
  path: ^1.9.0
  # State & Utils
  provider: ^6.0.5
  uuid: ^4.4.2
  intl: ^0.19.0
  image: ^4.2.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
